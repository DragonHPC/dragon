name: call-py310-runner-build

#
# Call runner-build.yaml for a python 3.10 dst-workflow or diy-workflow build
#

on: [workflow_call] # keep auto builds off for python 3.10 on push/pulls

jobs:
  call-build:
    uses: ./.github/workflows/runner-build.yaml
    secrets: inherit
    with:
      build-command: "dst/dragon_build.sh -n -p 310" # dst example = "dst/dragon_build.sh -n -p 310" or diy example = "runBuildPrep.py310.sh"
      build-type: "use-hybrid-workflow" # options = use-dst-workflow use-hybrid-workflow use-diy-workflow
      build-container: "arti.hpc.amslabs.hpecorp.net/quay-remote/pypa/manylinux_2_28_x86_64"
      build-cpu: "x86" # options = "x86" or "arm"
